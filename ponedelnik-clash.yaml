mixed-port: 7890
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

dns:
  enable: true
  ipv6: false
  nameserver:
    - 8.8.8.8
    - 1.1.1.1

proxies:
  - name: ponedelnik
    type: trojan
    server: proxy.ponedelnik.ru
    port: 8443
    password: "Q7!mZ2@pL9"
    sni: proxy.ponedelnik.ru
    udp: true

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - ponedelnik

